<!DOCTYPE html>
<html lang="en">

</head>
<body>

  <!-- FOOTER -->
  <footer>
    <p>📞 8857955359 | ✉️ unicorndestinations@gmail.com</p>
  </footer>

  <script type="module" src="script.js"></script>
</body>
</html>
