<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Unicorn Destinations – Create Itinerary</title>
  <link rel="stylesheet" href="admin.css">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>

  <!-- HERO HEADER -->
  <header class="hero">
    <div class="hero-bg-overlay"></div>
    <div class="overlay">
      <div class="logo-wrap">
        <img src="/assest/DESTINATION.png" alt="Logo" class="logo">
      </div>
      <h1>Unicorn Destinations</h1>
      <p>Your Journey, Our Expertise</p>
      <div class="hero-accent-line"></div>
    </div>
  </header>

  <!-- FORM INTRO -->
  <div class="form-intro">
    <div class="form-intro-inner">
      <span class="form-intro-tag">Admin Panel</span>
      <h2 class="form-intro-heading">Build Your Client's Itinerary</h2>
      <p class="form-intro-sub">Add each day's description, photos, and videos. When done, submit to generate a shareable link.</p>
    </div>
  </div>

  <!-- MAIN CONTENT -->
  <main>
    <form id="itineraryForm">

      <div id="daysContainer">
        <!-- Day blocks injected here by JS -->
      </div>

      <div class="form-actions">
        <button type="button" id="addDayBtn">
          <span class="btn-icon">+</span>
          <span>Add Day</span>
        </button>
        <button type="submit" class="submitBtn">
          <span class="btn-icon">✈</span>
          <span>Generate Itinerary</span>
        </button>
      </div>

    </form>
  </main>

  <!-- FOOTER -->
  <footer>
    <div class="footer-inner">
      <div class="footer-brand">Unicorn Destinations</div>
      <p>📞 8857955359 | ✉️ unicorndestinations@gmail.com</p>
    </div>
  </footer>

  <script type="module" src="admin.js"></script>

</body>
</html>
